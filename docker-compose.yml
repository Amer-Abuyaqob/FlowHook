services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowhook
    ports:
      - "5432:5432"
    volumes:
      - flowhook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/flowhook?sslmode=disable
      API_KEY: ${API_KEY:-dev-api-key}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: node dist/worker.js
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/flowhook?sslmode=disable
      API_KEY: ${API_KEY:-dev-api-key}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  flowhook_pgdata:
