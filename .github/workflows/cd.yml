name: CD

on:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # Same as CI: npm 11 + `npm ci` can hit EBADPLATFORM on optional `@esbuild/*` entries.
      - name: Install dependencies
        run: |
          npm install -g npm@10
          npm ci

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --tag ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/flowhook:latest \
            . \
            --suppress-logs \
            --quiet

      - name: Run migrations
        run: npm run db:migrate

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy flowhook \
            --image ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/flowhook:latest \
            --region ${{ secrets.GCP_REGION || 'us-central1' }} \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --service-account flowhook-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="DATABASE_URL=$DATABASE_URL,API_KEY=$API_KEY" \
            --max-instances=1 \
            --quiet
